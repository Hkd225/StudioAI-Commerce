name: build-and-test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install minimal test deps
        run: |
          python -m pip install --upgrade pip
          pip install pillow numpy pytest python-dotenv
      - name: Run tests
        run: pytest -q
